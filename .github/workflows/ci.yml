name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Start Nx Cloud CI run
        run: pnpm exec nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="metadata"

      - name: Check formatting
        run: pnpm exec nx record -- pnpm exec nx format:check --base="$NX_BASE" --head="$NX_HEAD"

      - name: Run affected checks
        run: pnpm exec nx affected -t lint test build typecheck metadata

      - name: Run Nx self-healing fixes
        run: pnpm exec nx fix-ci
        if: always()
